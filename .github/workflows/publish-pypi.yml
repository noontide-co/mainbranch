name: publish-pypi

# Publishes the mainbranch package to PyPI via trusted-publisher OIDC.
#
# Triggered by a GitHub Release (not raw tag-push). Requires the `pypi`
# GitHub Environment with at least one required reviewer.
#
# OIDC claim must match the pending publisher:
#   owner=noontide-co, repo=mainbranch, workflow=publish-pypi.yml, env=pypi.
#
# Publish release: tag `oe-vMAJOR.MINOR.PATCH` and use the Releases UI.
#
# Release notes: the `extract-changelog` job parses CHANGELOG.md for the
# section matching the release tag and updates the GitHub Release body
# with that section. Pattern borrowed from `companyctx`'s publish-pypi.yml.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mb
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: mb/dist/
          if-no-files-found: error

  release-notes:
    name: Sync release notes from CHANGELOG
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract CHANGELOG section for this release
        id: extract
        run: |
          # Tag scheme: oe-vMAJOR.MINOR.PATCH (e.g. oe-v0.1.0).
          # CHANGELOG heading: ## [MAJOR.MINOR.PATCH] - YYYY-MM-DD ...
          tag="${GITHUB_REF_NAME}"
          version="${tag#oe-v}"
          echo "tag=$tag version=$version"
          python3 - <<PY > release-notes.md
          import re, sys, pathlib
          version = "$version"
          body = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Match "## [<version>]" through the next "## [" or EOF.
          pattern = re.compile(
              r"^## \[" + re.escape(version) + r"\][^\n]*\n(.*?)(?=^## \[|\Z)",
              re.M | re.S,
          )
          m = pattern.search(body)
          if not m:
              # No matching section — fall back to the whole [Unreleased] block
              # so the release body isn't empty. Surface the gap visibly.
              fallback = re.search(
                  r"^## \[Unreleased\][^\n]*\n(.*?)(?=^## \[|\Z)",
                  body, re.M | re.S,
              )
              if fallback:
                  print(f"_(no CHANGELOG section for {version} — showing [Unreleased])_\n")
                  print(fallback.group(1).rstrip())
              else:
                  print(f"_(no CHANGELOG section for {version} found)_")
              sys.exit(0)
          print(m.group(1).rstrip())
          PY
          echo "---"
          cat release-notes.md

      - name: Update GitHub Release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --notes-file release-notes.md

  publish:
    name: Publish to PyPI
    needs: [build, release-notes]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mainbranch
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish via trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1

  linear-release:
    name: Sync Linear release
    needs: [publish]
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'oe-v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive Linear release metadata
        id: meta
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#oe-v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=Main Branch $version" >> "$GITHUB_OUTPUT"

      - name: Sync issues into Linear release
        uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: sync
          name: ${{ steps.meta.outputs.name }}
          version: ${{ steps.meta.outputs.tag }}

      - name: Mark Linear release as released
        uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: complete
          version: ${{ steps.meta.outputs.tag }}
