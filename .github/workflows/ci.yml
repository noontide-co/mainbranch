name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (mb umbrella)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: mb

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy (strict)
        run: mypy mb

      - name: Pytest with coverage
        run: pytest tests/ -v --cov=mb --cov-report=term-missing

  markdown-line-count:
    name: SKILL.md line-count gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: No SKILL.md over 500 lines
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            n=$(wc -l < "$f")
            if [ "$n" -gt 500 ]; then
              echo "::error file=$f::SKILL.md too long ($n lines > 500). Split references out."
              fail=1
            fi
          done < <(find .claude/skills .claude/playbooks -name SKILL.md 2>/dev/null)
          exit $fail
