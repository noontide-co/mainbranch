name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (mb umbrella)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: mb

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy (strict)
        run: mypy mb

      - name: Pytest with coverage
        run: pytest tests/ -v --cov=mb --cov-report=term-missing --cov-fail-under=70

  markdown-line-count:
    name: SKILL.md line-count gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: No SKILL.md over 500 lines
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            n=$(wc -l < "$f")
            if [ "$n" -gt 500 ]; then
              echo "::error file=$f::SKILL.md too long ($n lines > 500). Split references out."
              fail=1
            fi
          done < <(find .claude/skills .claude/playbooks -name SKILL.md 2>/dev/null)
          exit $fail

  wheel-install-smoke:
    # Release-path smoke test. The python matrix runs against an editable
    # install (``pip install -e .``), which can't catch packaging drift —
    # a missing ``py.typed`` in the built wheel, a stale
    # ``[tool.setuptools.package-data]`` entry, or an entry-point group
    # that only registers under editable mode. This job builds the wheel +
    # sdist the way PyPI will consume them, installs the wheel into a
    # clean venv (no repo sources on ``sys.path``), and runs the user-
    # facing smoke commands end-to-end.
    #
    # Single Python version — wheel packaging is pure-Python and doesn't
    # vary across 3.10/3.11/3.12 enough to justify matrixing. We pick 3.12
    # (latest supported target). Pattern borrowed from companyctx.
    #
    # Release wheels must carry the bundled engine root as package data.
    # The source tree keeps a single authoritative copy under .claude/;
    # setup.py copies that data into mb/_engine/.claude/ at build time.
    name: wheel-install-smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mb
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify package data shipped in wheel
        # The editable install test suite can't catch a missing py.typed —
        # it reads straight from the source tree. A wheel without py.typed
        # silently degrades downstream mypy to Any. Fail loudly here.
        run: |
          wheel=$(ls dist/mainbranch-*.whl | head -n1)
          echo "inspecting $wheel"
          python -m zipfile -l "$wheel"
          python -m zipfile -l "$wheel" | grep -E '(^|/)mb/py\.typed([[:space:]]|$)' \
            || { echo "::error::py.typed missing from wheel"; exit 1; }
          python -m zipfile -l "$wheel" | grep -E '(^|/)mb/_engine/\.claude/skills/start/SKILL\.md([[:space:]]|$)' \
            || { echo "::error::bundled skills missing from wheel"; exit 1; }
          python -m zipfile -l "$wheel" | grep -E '(^|/)mb/_engine/\.claude/playbooks/ship-bet/SKILL\.md([[:space:]]|$)' \
            || { echo "::error::bundled playbooks missing from wheel"; exit 1; }
          python -m zipfile -l "$wheel" | grep -E '(^|/)mb/_engine/\.claude/reference/vip-path-resolution\.md([[:space:]]|$)' \
            || { echo "::error::bundled reference files missing from wheel"; exit 1; }

      - name: Create fresh venv and install the wheel
        # Fresh venv means no repo sources on sys.path — a genuine
        # release-path install. ``pip install <wheel>`` (not ``-e``) is
        # the point of this job; an editable install can't catch
        # package-data drift.
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/pip install --upgrade pip
          .venv-smoke/bin/pip install ./dist/mainbranch-*.whl

      - name: Smoke — mb --version
        # Exit 0 and emits ``mb <version>`` where <version> matches
        # the installed distribution metadata. Catches entry-point
        # registration drift (``[project.scripts]`` stale) and version
        # skew between ``mb.__version__`` and the wheel metadata.
        run: |
          expected="mb $(.venv-smoke/bin/python -c \
            'from importlib.metadata import version; print(version("mainbranch"))')"
          out=$(.venv-smoke/bin/mb --version)
          echo "expected=$expected"
          echo "actual=  $out"
          if [ "$out" != "$expected" ]; then
            echo "::error::--version output ($out) does not match installed dist metadata ($expected)"
            exit 1
          fi

      - name: Smoke — python -c "import mb; mb.__version__"
        # Catches missing __version__ attribute or import-time errors that
        # the CLI smoke might mask via Typer's exception handling.
        run: |
          .venv-smoke/bin/python -c '
          import mb
          assert hasattr(mb, "__version__"), "mb.__version__ missing"
          assert mb.__version__, "mb.__version__ empty"
          print("import ok:", mb.__version__)
          '

      - name: Smoke — mb --help (root help renders)
        # Catches Typer registration drift across subcommands. A broken
        # subcommand declaration crashes --help on import.
        run: |
          .venv-smoke/bin/mb --help > help.txt
          cat help.txt
          grep -qi "main branch\|scaffolds" help.txt \
            || { echo "::error::root --help output missing expected description"; exit 1; }

      - name: Smoke — bare mb launch screen renders in a TTY
        # The default no-args command is intentionally TTY-sensitive:
        # non-interactive callers get command help, humans get the launch
        # screen. Unit tests monkeypatch this, but the wheel smoke proves the
        # installed console script renders the real TTY path.
        run: |
          .venv-smoke/bin/python - <<'PY'
          import os
          import pty
          import subprocess

          master, slave = pty.openpty()
          try:
              proc = subprocess.Popen(
                  [".venv-smoke/bin/mb"],
                  stdin=slave,
                  stdout=slave,
                  stderr=slave,
                  text=False,
              )
              os.close(slave)
              chunks = []
              while True:
                  try:
                      chunk = os.read(master, 4096)
                  except OSError:
                      break
                  if not chunk:
                      break
                  chunks.append(chunk)
              rc = proc.wait(timeout=5)
          finally:
              os.close(master)

          out = b"".join(chunks).decode("utf-8", errors="replace")
          print(out)
          if rc != 0:
              raise SystemExit(f"mb exited {rc}")
          for expected in ("Choose a trail", "mb status", "mb doctor", "mb --help"):
              if expected not in out:
                  raise SystemExit(f"launch screen missing {expected!r}")
          if "Usage:" in out:
              raise SystemExit("TTY launch screen fell back to command help")
          PY

      - name: Smoke — mb --plain keeps non-interactive command help
        run: |
          .venv-smoke/bin/mb --plain > plain.txt
          cat plain.txt
          grep -q "Usage:" plain.txt \
            || { echo "::error::mb --plain did not render command help"; exit 1; }
          ! grep -q "Choose a trail" plain.txt \
            || { echo "::error::mb --plain rendered launch screen"; exit 1; }

      - name: Smoke — mb skill list is populated
        run: |
          .venv-smoke/bin/mb skill list > skills.txt
          cat skills.txt
          grep -qx "start" skills.txt \
            || { echo "::error::mb skill list missing bundled start skill"; exit 1; }
          grep -qx "think" skills.txt \
            || { echo "::error::mb skill list missing bundled think skill"; exit 1; }

      - name: Smoke — mb init wires Claude Code skills
        run: |
          repo=$(mktemp -d)
          .venv-smoke/bin/mb init "$repo" --name "Acme Brewing"
          test -f "$repo/.claude/settings.local.json" \
            || { echo "::error::settings.local.json missing"; exit 1; }
          test -f "$repo/.claude/skills/start/SKILL.md" \
            || { echo "::error::start skill bridge missing"; exit 1; }
          .venv-smoke/bin/python - "$repo" <<'PY'
          import json, pathlib, sys
          repo = pathlib.Path(sys.argv[1])
          settings = json.loads((repo / ".claude/settings.local.json").read_text())
          dirs = settings["permissions"]["additionalDirectories"]
          assert dirs, "additionalDirectories empty"
          root = pathlib.Path(dirs[0])
          assert (root / ".claude/skills/start/SKILL.md").is_file(), root
          assert (root / ".claude/reference/vip-path-resolution.md").is_file(), root
          PY

      - name: Smoke — mb status on initialized repo emits JSON
        run: |
          repo=$(mktemp -d)
          .venv-smoke/bin/mb init "$repo" --name "Acme Brewing"
          .venv-smoke/bin/mb status "$repo" --json > status.json
          cat status.json
          .venv-smoke/bin/python - <<'PY'
          import json

          report = json.load(open("status.json"))
          assert report["repo"]["looks_like_mainbranch_repo"] is True
          assert report["runtime"]["skill_wiring"]["ok"] is True
          assert "readiness" in report
          assert "next_actions" in report["readiness"]
          PY

      - name: Smoke — mb update check emits JSON envelope
        # A plain venv wheel is neither the recommended pipx install nor a
        # source clone, so the command may exit 1. That is acceptable here:
        # this smoke asserts the installed command degrades with structured
        # JSON instead of crashing or printing prose-only diagnostics.
        run: |
          set +e
          .venv-smoke/bin/mb update --check --json > update.json
          rc=$?
          set -e
          cat update.json
          if [ "$rc" -gt 1 ]; then
            echo "::error::mb update --check crashed (exit $rc)"
            exit 1
          fi
          .venv-smoke/bin/python - <<'PY'
          import json

          report = json.load(open("update.json"))
          assert "ok" in report
          assert "mode" in report
          assert "errors" in report
          assert "actions" in report
          PY

      - name: Smoke — mb doctor (runs against empty cwd)
        # A second user-facing CLI surface that doesn't depend on bundled
        # skills. Runs in a temp dir so doctor lands a real diagnosis
        # against an empty repo (it should exit non-zero with a report,
        # which is fine — the check is "does it crash?").
        run: |
          mkdir -p /tmp/doctor-smoke && cd /tmp/doctor-smoke
          set +e
          $GITHUB_WORKSPACE/mb/.venv-smoke/bin/mb doctor . --json > out.json
          rc=$?
          set -e
          echo "doctor exit=$rc"
          # Exit 0 (clean) or 1 (red checks) are both acceptable. Anything
          # else (2+, segfault) means the command itself broke.
          if [ "$rc" -gt 1 ]; then
            cat out.json
            echo "::error::mb doctor crashed (exit $rc)"
            exit 1
          fi
          # Verify it emitted valid JSON.
          python3 -c 'import json; json.load(open("out.json"))'
